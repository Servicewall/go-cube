cube:
  name: AuditView
  sql_table: default.audit

  segments:
    org:
      sql: org = {vars.org}

    hasValidDepartment:
      sql: content IN (SELECT uid FROM default.user_dict WHERE department <> '')

    top:
      sql: >-
        content GLOBAL IN (
          SELECT arrayJoin(approx_top_sum(300, 100)(content, count)).1
          FROM default.audit
          WHERE org = {vars.org}
            AND {filter.dt}
            AND {filter.channel}
            AND {filter.type}
            AND {filter.ipGeoCountry}
            AND {filter.ipGeoProvince}
            AND {filter.department}
            AND {filter.deviceType}
        )

  dimensions:
    dt:
      sql: dt
      type: time

    channel:
      sql: channel
      type: string

    type:
      sql: type
      type: string
      title: 维度

    content:
      sql: content
      type: string
      title: 风险主体

    ipGeoCountry:
      sql: ip_geo[1]
      type: string
      title: IP属地(国家)

    ipGeoProvince:
      sql: ip_geo[2]
      type: string
      title: IP属地(省份)

    department:
      sql: dictGetString('default.user_dict', 'department', content)
      type: string
      title: 所属部门

    deviceType:
      sql: multiIf(startsWith(content, 'S1') OR startsWith(content, 'TS1'), 'H5', startsWith(content, 'S2') OR startsWith(content, 'TS2'), 'iOS', startsWith(content, 'S3') OR startsWith(content, 'TS3'), 'Android', startsWith(content, 'S4') OR startsWith(content, 'TS4'), '小程序', startsWith(content, 'S5') OR startsWith(content, 'TS5'), 'Harmony', '')
      type: string
      title: 设备种类

    nameGroup:
      sql: dictGet('default.name_group_dict', 'groups', content)
      type: string
      title: 名单分组

  measures:
    count:
      sql: sum(count)
      type: number
      title: 累计访问次数

    sidUniq:
      sql: uniqHLL12Merge(sid_uniq)
      type: number
      title: 关联设备

    uaUniq:
      sql: uniqHLL12Merge(ua_uniq)
      type: number
      title: 关联终端

    ipUniq:
      sql: uniqHLL12Merge(ip_uniq)
      type: number
      title: 关联IP

    uidUniq:
      sql: uniqHLL12Merge(uid_uniq)
      type: number
      title: 关联用户

    appUniq:
      sql: uniq(channel)
      type: number
      title: 访问应用

    apiUniq:
      sql: uniqIfMerge(api_uniq)
      type: number
      title: 访问API

    ipGeo:
      sql: anyLast(ip_geo)
      type: string
      title: 地域

    lastTs:
      sql: max(last_ts)
      type: time
      title: 最近发现时间

    # 风险规则相关（与请求/响应涉敏结构一致）
    # riskCount: arrayFilter过滤掉score=0的规则
    riskScoreTuple:
      sql: arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('default.risk_dict','score',x.1)), arrayFilter(x -> dictGetInt64('default.risk_dict','score',x.1)!=0, arrayZip(sumMap(risk_count).1, sumMap(risk_count).2))))
      type: array
      title: 命中规则

    # 请求涉敏 [('密码(14)', 80), ('手机(13)', 50)]
    reqSensScoreTuple:
      sql: arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('default.privacy_dict','score',x.1)), arrayZip(mapKeys(uniqMapMerge(req_sens_uniq)), mapValues(uniqMapMerge(req_sens_uniq)))))
      type: array
      title: 请求涉敏

    # 响应涉敏 [('密码(14)', 80), ('手机(13)', 50)]
    resSensScoreTuple:
      sql: arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('default.privacy_dict','score',x.1)), arrayZip(mapKeys(uniqMapMerge(res_sens_uniq)), mapValues(uniqMapMerge(res_sens_uniq)))))
      type: array
      title: 响应涉敏

